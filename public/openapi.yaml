openapi: 3.1.0
info:
  title: Casos Front — API interna Postgres (/api/db)
  description: |
    Endpoints Next.js que acessam o Supabase via Drizzle. Todas as respostas JSON com corpo seguem envelope:
    - **Sucesso (2xx):** `{ "data": ... }`
    - **Erro (4xx/5xx com corpo):** `{ "error": { "message": string } }`
    - **204 No Content:** corpo vazio (DELETE bem-sucedido).

    **Autenticação:** cookie HttpOnly `casos_token` após `POST /api/login` (mesma origem; use `credentials: include`).
  version: 1.0.0
  contact:
    name: Casos Front

servers:
  - url: /
    description: Origem do Next.js (dev ou produção)

tags:
  - name: Ping
    description: Sanidade de sessão e banco
  - name: Acquirers
    description: Adquirentes
  - name: PublicAcquirers
    description: Listagem pública de adquirentes (sem sessão)
  - name: Devices
    description: Dispositivos
  - name: Versions
    description: Versões de software
  - name: AcquirerStatus
    description: Status por adquirente
  - name: CompatibleDevices
    description: Dispositivos compatíveis por status
  - name: Users
    description: Usuário local (app_users) e permissões RBAC
  - name: RBAC
    description: Módulos de permissão, catálogo de permissões, papéis e vínculos (administração)

security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: casos_token
      description: Definido pelo `POST /api/login` (HttpOnly).

  schemas:
    OpaqueId:
      type: string
      description: |
        Identificador público opaco (não é UUID). Gerado de forma determinística via HMAC no servidor
        e estável para a mesma entidade.
      example: acq_KwQ2n2G8Vx7iQy3p2qkR4w

    PublicAcquirer:
      type: object
      required: [id, name, has4g]
      properties:
        id:
          $ref: "#/components/schemas/OpaqueId"
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        has4g:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true

    PublicAcquirerCompatibleDeviceRow:
      type: object
      required: [deviceId, deviceName, isPrimary]
      properties:
        deviceId:
          $ref: "#/components/schemas/OpaqueId"
        deviceName:
          type: string
        androidVersion:
          type: string
          nullable: true
        isPrimary:
          type: boolean
          description: |
            `true` quando o dispositivo corresponde a `recommendedDeviceId` do status ativo.

    PublicAcquirerListExpandedItem:
      type: object
      required: [acquirer, compatibleDevices]
      properties:
        acquirer:
          $ref: "#/components/schemas/PublicAcquirer"
        acquirerStatusId:
          $ref: "#/components/schemas/OpaqueId"
          nullable: true
          description: ID público do status ativo usado no enriquecimento, se existir.
        status:
          type: string
          nullable: true
          description: Valor do enum Postgres `status_type` (ex. Concluído, Em homologação).
        currentVersionName:
          type: string
          nullable: true
        nextVersionName:
          type: string
          nullable: true
        deliveryDate:
          type: string
          format: date
          nullable: true
        recommendedDeviceId:
          $ref: "#/components/schemas/OpaqueId"
          nullable: true
        isActive:
          type: boolean
          nullable: true
          description: Indica se o `acquirer_status` usado no enriquecimento está ativo (`is_active`).
        compatibleDevices:
          type: array
          items:
            $ref: "#/components/schemas/PublicAcquirerCompatibleDeviceRow"

    PublicAcquirerListExpandedResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PublicAcquirerListExpandedItem"

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
              example: Não autorizado

    PingData:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    SuccessPing:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PingData"

    AppUserSummary:
      type: object
      required:
        - id
        - legacyUserId
        - email
        - nome
        - setor
        - usuarioGrupoId
      properties:
        id:
          type: string
          format: uuid
        legacyUserId:
          type: integer
        email:
          type: string
        nome:
          type: string
        setor:
          type: string
        usuarioGrupoId:
          type: string

    UserSyncPayload:
      type: object
      required: [appUser, permissions]
      properties:
        appUser:
          $ref: "#/components/schemas/AppUserSummary"
        permissions:
          type: array
          items:
            type: string
          description: Códigos distintos de `permissions.code` via papéis do usuário.

    SuccessUserSync:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/UserSyncPayload"

    PermissionModule:
      type: object
      required: [id, slug, name, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    PermissionAdmin:
      type: object
      required: [id, moduleId, code, label, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid
        code:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer

    RoleAdmin:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true

    RoleWithPermissionsCount:
      allOf:
        - $ref: "#/components/schemas/RoleAdmin"
        - type: object
          required: [permissionsCount]
          properties:
            permissionsCount:
              type: integer
              minimum: 0
              description: Total de vínculos em `role_permissions` para este papel.

    RoleWithPermissionsCountListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RoleWithPermissionsCount"

    AppUserAdmin:
      type: object
      required: [id, legacyUserId, email, nome, setor, usuarioGrupoId]
      properties:
        id:
          type: string
          format: uuid
        legacyUserId:
          type: integer
        email:
          type: string
        nome:
          type: string
        setor:
          type: string
        usuarioGrupoId:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    PermissionModuleListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PermissionModule"

    PermissionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PermissionAdmin"

    RoleListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RoleAdmin"

    AppUserListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AppUserListItem"

    AppUserListItem:
      allOf:
        - $ref: "#/components/schemas/AppUserAdmin"
        - type: object
          properties:
            roleName:
              type: string
              nullable: true
              description: Nome do papel atualmente vinculado ao usuário (null quando sem vínculo).

    PermissionWithModule:
      allOf:
        - $ref: "#/components/schemas/PermissionAdmin"
      type: object
      required: [module]
      properties:
        module:
          $ref: "#/components/schemas/PermissionModule"

    PermissionOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PermissionAdmin"

    PermissionWithModuleOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PermissionWithModule"

    RoleOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/RoleAdmin"

    AppUserOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AppUserAdmin"

    AppUserWithRoles:
      allOf:
        - $ref: "#/components/schemas/AppUserAdmin"
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleAdmin"

    AppUserWithRolesResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AppUserWithRoles"

    RolePermissionDetail:
      type: object
      required: [roleId, permissionId, permission, module]
      properties:
        roleId:
          type: string
          format: uuid
        permissionId:
          type: string
          format: uuid
        permission:
          $ref: "#/components/schemas/PermissionAdmin"
        module:
          $ref: "#/components/schemas/PermissionModule"

    RolePermissionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RolePermissionDetail"

    RolePermissionLink:
      type: object
      required: [roleId, permissionId]
      properties:
        roleId:
          type: string
          format: uuid
        permissionId:
          type: string
          format: uuid

    RolePermissionLinkResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/RolePermissionLink"

    RolePermissionBatchLink:
      type: object
      required: [items, skippedPermissionIds]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RolePermissionLink"
        skippedPermissionIds:
          type: array
          items:
            type: string
            format: uuid
          description: |
            Permissões que não geraram insert (já vinculadas a este papel ou duplicata no corpo).

    RolePermissionBatchLinkResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/RolePermissionBatchLink"

    RolePermissionSyncRequest:
      type: object
      required: [permissionIds]
      properties:
        permissionIds:
          type: array
          maxItems: 1000
          items:
            type: string
            format: uuid
          description: |
            Lista **final** de permissões do papel. Array vazio remove todos os vínculos.

    RolePermissionSyncResult:
      type: object
      required: [added, removed, current]
      properties:
        added:
          type: array
          items: { type: string, format: uuid }
          description: IDs inseridos nesta sincronização.
        removed:
          type: array
          items: { type: string, format: uuid }
          description: IDs removidos nesta sincronização.
        current:
          type: array
          items: { type: string, format: uuid }
          description: Estado final (deduplicado) das permissões do papel.

    RolePermissionSyncResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/RolePermissionSyncResult"

    UserRoleLink:
      type: object
      required: [userId, roleId]
      properties:
        userId:
          type: string
          format: uuid
        roleId:
          type: string
          format: uuid

    UserRoleLinkResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/UserRoleLink"

    Acquirer:
      type: object
      required: [id, name, has4g]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        has4g:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true

    AcquirerCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          format: uri
          nullable: true
        has4g:
          type: boolean

    AcquirerUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          format: uri
          nullable: true
        has4g:
          type: boolean

    AcquirerListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Acquirer"

    AcquirerCompatibleDeviceRow:
      type: object
      required: [deviceId, deviceName, isPrimary]
      properties:
        deviceId:
          type: string
          format: uuid
        deviceName:
          type: string
        androidVersion:
          type: string
          nullable: true
        isPrimary:
          type: boolean
          description: |
            `true` quando o dispositivo corresponde a `recommended_device_id` do `acquirer_status` ativo.

    AcquirerListExpandedItem:
      type: object
      required: [acquirer, compatibleDevices]
      properties:
        acquirer:
          $ref: "#/components/schemas/Acquirer"
        acquirerStatusId:
          type: string
          format: uuid
          nullable: true
          description: ID do `acquirer_status` ativo usado no enriquecimento (`is_active = true`), se existir.
        status:
          type: string
          nullable: true
          description: Valor do enum Postgres `status_type` (ex. Concluído, Em homologação).
        currentVersionName:
          type: string
          nullable: true
          description: Nome (`versions.name`) da versão atual (`current_version_id`).
        nextVersionName:
          type: string
          nullable: true
          description: Nome da próxima versão (`next_version_id`), se houver.
        deliveryDate:
          type: string
          format: date
          nullable: true
        recommendedDeviceId:
          type: string
          format: uuid
          nullable: true
        isActive:
          type: boolean
          nullable: true
          description: Valor de `acquirer_status.is_active` da linha de status usada no enriquecimento.
        compatibleDevices:
          type: array
          items:
            $ref: "#/components/schemas/AcquirerCompatibleDeviceRow"
          description: Linhas de `acquirer_compatible_devices` + nome do dispositivo, para o status selecionado.

    AcquirerListExpandedResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AcquirerListExpandedItem"

    AcquirerOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Acquirer"

    Device:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true

    DeviceCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    DeviceUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1

    DeviceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Device"

    DeviceOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Device"

    Version:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        name:
          type: string
          nullable: true

    VersionCreate:
      type: object
      properties:
        name:
          type: string
          nullable: true

    VersionUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          nullable: true

    VersionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Version"

    VersionOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Version"

    StatusType:
      type: string
      enum: [not_started]
      description: Valores do enum Postgres `status_type`.

    AcquirerStatus:
      type: object
      required: [id, acquirerId, status, currentVersionId, isActive]
      properties:
        id:
          type: string
          format: uuid
        acquirerId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/StatusType"
        currentVersionId:
          type: string
          format: uuid
        nextVersionId:
          type: string
          format: uuid
          nullable: true
        deliveryDate:
          type: string
          format: date
          nullable: true
          description: YYYY-MM-DD
        recommendedDeviceId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        sortOrder:
          type: integer
          nullable: true
        isActive:
          type: boolean
        obs:
          type: string
          nullable: true

    AcquirerStatusCreate:
      type: object
      required: [acquirerId, currentVersionId]
      properties:
        acquirerId:
          type: string
          format: uuid
        currentVersionId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/StatusType"
        nextVersionId:
          type: string
          format: uuid
          nullable: true
        deliveryDate:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          nullable: true
        recommendedDeviceId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
        obs:
          type: string
          nullable: true

    AcquirerStatusUpdate:
      type: object
      minProperties: 1
      properties:
        acquirerId:
          type: string
          format: uuid
        currentVersionId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/StatusType"
        nextVersionId:
          type: string
          format: uuid
          nullable: true
        deliveryDate:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          nullable: true
        recommendedDeviceId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
        obs:
          type: string
          nullable: true

    AcquirerStatusListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AcquirerStatus"

    AcquirerStatusOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AcquirerStatus"

    CompatibleDevice:
      type: object
      required: [statusId, deviceId]
      properties:
        statusId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        androidVersion:
          type: string
          nullable: true

    CompatibleDeviceCreate:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          format: uuid
        androidVersion:
          type: string
          nullable: true

    CompatibleDeviceLinkBody:
      type: object
      required: [statusId, deviceId]
      properties:
        statusId:
          type: string
          format: uuid
          description: ID de `acquirer_status`.
        deviceId:
          type: string
          format: uuid
          description: ID de `devices`.
        androidVersion:
          type: string
          nullable: true

    CompatibleDeviceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CompatibleDevice"

    CompatibleDeviceOneResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/CompatibleDevice"

  parameters:
    ListSearchQuery:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: |
        Busca case-insensitive por substring (`ILIKE`).
        **Adquirentes e dispositivos:** coluna `name`.
        **Versões:** coluna `name` ou `id` (UUID como texto).
        Caracteres `%`, `_` e `\` no termo são tratados de forma literal.

    ListAcquirersExpandQuery:
      name: expand
      in: query
      required: false
      schema:
        type: string
        enum: [status]
      description: |
        **`status`:** cada elemento de `data` inclui o objeto `acquirer` e, quando existir um `acquirer_status`
        ativo para o adquirente (`is_active = true`, escolha por `sort_order` e `created_at`), os campos
        de status, nomes das versões atual/próxima e a lista `compatibleDevices` derivada de `acquirer_compatible_devices`.
        Sem este parâmetro (ou com valor diferente de `status`), `data` é um array de `Acquirer` apenas.

    ListAcquirersStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - Em desenvolvimento
          - Em teste
          - Em homologação
          - Em certificação
          - Concluído
      description: |
        Filtra adquirentes pelo valor `status` (`status_type`) do registro **ativo** de `acquirer_status`
        associado ao adquirente. Adquirentes sem status ativo ou com outro valor não entram no resultado.
        Efeito prático quando `expand=status` (lista enriquecida). Se `expand` não for `status`, o parâmetro
        ainda é validado quando enviado, mas não altera o formato nem o conteúdo da lista básica de adquirentes.

  responses:
    Unauthorized:
      description: Cookie `casos_token` ausente ou rota não autenticada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              message: Não autorizado
    BadRequest:
      description: JSON inválido ou validação Zod falhou.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Violação de FK ou unique (Postgres 23503 / 23505).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Erro interno não tratado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServiceUnavailable:
      description: Falha ao conectar ou consultar o banco (apenas ping).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

paths:
  /api/db/ping:
    get:
      tags: [Ping]
      summary: Ping do banco
      description: Exige sessão; executa `SELECT 1` no Postgres.
      operationId: dbPing
      responses:
        "200":
          description: Banco acessível.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessPing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/db/users/sync:
    post:
      tags: [Users]
      summary: Sincronizar usuário e permissões
      description: |
        Exige sessão (`casos_token`). Chama `GET /auth/me` na API Soft Flow com o Bearer do cookie,
        valida o payload, faz upsert em `app_users` e retorna os códigos de permissão efetivos (RBAC).
      operationId: dbUsersSync
      responses:
        "200":
          description: Usuário sincronizado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessUserSync"
