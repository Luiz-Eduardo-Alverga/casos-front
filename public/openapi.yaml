  /api/db/roles/{id}/permissions:
    parameters:
      - name: id
        in: path
        required: true
        description: ID do papel (`roles.id`)
        schema:
          type: string
          format: uuid
    get:
      tags: [RBAC]
      summary: Listar permissões do papel (role_permissions)
      description: |
        Retorna cada vínculo com `permission` e `module` para montar a matriz na UI.
      operationId: listRolePermissionsForRole
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePermissionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [RBAC]
      summary: Vincular permissão(ões) ao papel
      description: |
        Insere em `role_permissions` (`role_id`, `permission_id`).
        Envie **ou** `permissionId` (um vínculo) **ou** `permissionIds` (vários, até 500).
        Com `permissionId`, 409 se já houver vínculo. Com `permissionIds`, vínculos existentes
        são ignorados; a resposta inclui `skippedPermissionIds` e 200 se nada novo for criado.
      operationId: linkRolePermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [permissionId]
                  not:
                    required: [permissionIds]
                  properties:
                    permissionId:
                      type: string
                      format: uuid
                - type: object
                  required: [permissionIds]
                  not:
                    required: [permissionId]
                  properties:
                    permissionIds:
                      type: array
                      minItems: 1
                      maxItems: 500
                      items:
                        type: string
                        format: uuid
      responses:
        "200":
          description: Várias permissões; nenhum vínculo novo (todos já existiam)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePermissionBatchLinkResponse"
        "201":
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RolePermissionLinkResponse"
                  - $ref: "#/components/schemas/RolePermissionBatchLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
          description: Apenas com corpo `permissionId` — vínculo duplicado
    put:
      tags: [RBAC]
      summary: Sincronizar matriz de permissões do papel
      description: |
        Recebe a lista **final** `permissionIds` e sincroniza em transação:
        insere os IDs ausentes e remove os que não estão na lista.
        Array vazio remove todos os vínculos do papel.
        Retorna `added`, `removed` e `current`.
      operationId: syncRolePermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolePermissionSyncRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePermissionSyncResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
          description: Papel não encontrado ou alguma permissão não existe

  /api/db/roles/{id}/permissions/{permissionId}:
    parameters:
      - name: id
        in: path
